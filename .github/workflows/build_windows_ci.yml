name: Build Windows (CI)

# Self-contained Windows build workflow that does not depend on the
# private Prusa-Development/PrusaSlicer-Actions repository.
#
# Strategy:
#   1. Build dependencies (deps/) once and cache the destdir.
#   2. Build PrusaSlicer against the cached deps.
#   3. Upload prusa-slicer.exe + DLLs + resources/ as an artifact.

on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/**'

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 350

    env:
      DEPS_DESTDIR: ${{ github.workspace }}\deps_destdir
      BUILD_CONFIG: RelWithDebInfo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable long paths
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWord -Force | Out-Null

      - name: Exclude workspace from Defender
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:TEMP" -ErrorAction SilentlyContinue

      - name: Free disk space
        shell: pwsh
        run: |
          $before = (Get-PSDrive C).Free / 1GB
          Write-Host ("Free before: {0:N2} GB" -f $before)
          $paths = @(
            "C:\Program Files\dotnet",
            "C:\Program Files (x86)\Android",
            "C:\Android",
            "C:\hostedtoolcache\windows\Java_Temurin-Hotspot_jdk",
            "C:\hostedtoolcache\windows\Ruby",
            "C:\hostedtoolcache\windows\go",
            "C:\hostedtoolcache\windows\PyPy"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Remove-Item $p -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
          $after = (Get-PSDrive C).Free / 1GB
          Write-Host ("Free after:  {0:N2} GB" -f $after)

      - name: Restore deps cache
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_DESTDIR }}
          key: prusaslicer-deps-win2022-${{ hashFiles('deps/+*/*.cmake', 'deps/CMakeLists.txt', 'deps/CMakePresets.json') }}
          restore-keys: |
            prusaslicer-deps-win2022-

      - name: Build dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 -app_platform=Desktop || exit /b 1
          if not exist deps\build mkdir deps\build
          cd deps\build
          cmake .. -DDESTDIR="%DEPS_DESTDIR%" -DDEP_DEBUG=OFF || exit /b 1
          msbuild /m:2 /v:normal /nologo ALL_BUILD.vcxproj /p:Configuration=Release /p:ContinueOnError=false /flp:LogFile=msbuild.log;ErrorsOnly /flp1:LogFile=msbuild-warnings.log;WarningsOnly || exit /b 1

      - name: Diagnose deps build failure
        if: failure() && steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "==== Disk usage ===="
          Get-PSDrive C, D | Format-Table -AutoSize
          Write-Host "`n==== Memory ===="
          Get-CimInstance Win32_OperatingSystem |
            Select-Object @{N='TotalGB';E={[math]::Round($_.TotalVisibleMemorySize/1MB,2)}},
                          @{N='FreeGB';E={[math]::Round($_.FreePhysicalMemory/1MB,2)}} |
            Format-Table -AutoSize
          Write-Host "`n==== MSBuild error log (deps\build\msbuild.log) ===="
          if (Test-Path "deps\build\msbuild.log") {
            Get-Content "deps\build\msbuild.log" -Tail 200
          } else {
            Write-Host "(not found)"
          }
          Write-Host "`n==== Last completed external projects (destdir\usr\local\lib) ===="
          if (Test-Path "${env:DEPS_DESTDIR}\usr\local\lib") {
            Get-ChildItem "${env:DEPS_DESTDIR}\usr\local\lib" -Filter *.lib |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 30 |
              Format-Table LastWriteTime, Name -AutoSize
          } else {
            Write-Host "(destdir lib not found)"
          }
          Write-Host "`n==== Top-level deps build dir ===="
          if (Test-Path "deps\build") {
            Get-ChildItem "deps\build" -Directory |
              Select-Object Name, LastWriteTime |
              Sort-Object LastWriteTime -Descending |
              Format-Table -AutoSize
          }

      - name: Upload deps build log on failure
        if: failure() && steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: deps-failure-logs
          path: |
            deps/build/msbuild.log
            deps/build/msbuild-warnings.log
            deps/build/CMakeFiles/CMakeOutput.log
            deps/build/CMakeFiles/CMakeError.log
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup deps build tree
        if: success() && steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (Test-Path "deps\build") {
            Remove-Item "deps\build" -Recurse -Force
          }

      - name: Configure PrusaSlicer
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 -app_platform=Desktop || exit /b 1
          if not exist build mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH="%DEPS_DESTDIR%\usr\local" -DCMAKE_CONFIGURATION_TYPES=%BUILD_CONFIG% || exit /b 1

      - name: Build PrusaSlicer
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 -app_platform=Desktop || exit /b 1
          cd build
          msbuild /m:2 /v:normal /nologo ALL_BUILD.vcxproj /p:Configuration=%BUILD_CONFIG% /p:ContinueOnError=false || exit /b 1

      - name: Package artifact
        shell: pwsh
        run: |
          $dist = "${{ github.workspace }}\dist"
          New-Item -ItemType Directory -Path $dist -Force | Out-Null

          $binSrc = "${{ github.workspace }}\build\src\${env:BUILD_CONFIG}"
          if (-not (Test-Path $binSrc)) {
            throw "Build output directory not found: $binSrc"
          }

          # Copy binaries and runtime DLLs, excluding pdb files to keep artifact small
          Get-ChildItem -Path $binSrc -File | Where-Object { $_.Extension -ne ".pdb" } |
            Copy-Item -Destination $dist
          Get-ChildItem -Path $binSrc -Directory | Where-Object { $_.Name -ne "resources" } |
            Copy-Item -Destination $dist -Recurse

          # Resources directory must sit next to the executable at runtime.
          # Use the source-of-truth from the repo, replacing any copy that
          # the build placed next to the binaries.
          $distResources = Join-Path $dist "resources"
          if (Test-Path $distResources) {
            Remove-Item $distResources -Recurse -Force
          }
          Copy-Item -Path "${{ github.workspace }}\resources" -Destination $dist -Recurse

          Get-ChildItem $dist | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrusaSlicer-windows-x64
          path: dist
          retention-days: 14
          if-no-files-found: error
